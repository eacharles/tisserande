name: Docs Build

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "src/**"
      - ".readthedocs.yaml"
      - "pyproject.toml"
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - "src/**"
      - ".readthedocs.yaml"
      - "pyproject.toml"

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install -e ".[docs,dev]"

      - name: Build docs
        run: |
          cd docs
          make html

      - name: Upload docs artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: docs-html
          path: docs/_build/html/
          retention-days: 7
